<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <Style>
        *{
            margin: 0;
            padding: 0;
        }
        .box{
            width: 100px;
            height: 100px;

        }
        .box-1{
            width: 300px;
            height: 300px;
            position: relative;
         
        }
        .box-2{
            width: 300px;
            height: 300px;  
            position: relative;
            top: -150px;
            left: 150px;

        }
        .box-3{
            width: 300px;
            height: 300px;   
            position: relative;
            top: -300px;
            left: 300px;
        }

        .yellow-box-1{
            width: 100px;
            height: 100px;
            position: absolute;
            left: 200px;
    
        }

        .yellow-box-2{
            width: 100px;
            height: 100px;
            position: absolute;
            bottom: 0px;

        }

        .bg1{
            background-color: yellow;
           
        }
        .bg2{
            background-color: skyblue;
          
        }
        .bg3{
            background-color: navy;
 
        }
        .bg4{
            background-color: red;

        }
        .bg5{
            background-color: brown;
        }

      .div{
        position: relative;
        top: 200px;
        left: 200px;
      }
    </Style>
</head>
<body>
    <div class="div">
        <div class="box-1 bg4">
            <div class="yellow-box-1 bg1"></div>
            <div class="yellow-box-2 bg1"></div>
        </div>
        <div class="box-2 bg2">
            <div class="yellow-box-1 bg1"></div>
            <div class="yellow-box-2 bg1"></div>
        </div>
        <div class="box-3 bg3">
            <div class="yellow-box-1 bg1"></div>
            <div class="yellow-box-2 bg1"></div>
        </div>
    </div>
</body>
</html>
